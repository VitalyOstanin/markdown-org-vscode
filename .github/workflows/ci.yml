name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  # Codecov OIDC: required so the codecov-action can exchange a short-lived
  # GitHub-issued JWT for an upload credential -- no long-lived
  # CODECOV_TOKEN secret needed.
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + format check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        # tsc --noEmit gives an explicit, distinct signal when types break.
        # Compile below still runs to verify the build itself succeeds, but
        # typecheck failures surface earlier with a clearer step name.
        run: npm run typecheck

      - name: Compile
        run: npm run compile

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Compile
        run: npm run compile

      - name: Run unit tests
        run: npm test

      - name: Run integration tests
        run: npm run test:integration

  coverage:
    name: Coverage (non-blocking)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # Coverage thresholds are floors set just below current values -- regressions
    # should be visible, not block merges. Codecov outages are also expected
    # not to fail the build.
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          # OIDC removes the need for a long-lived CODECOV_TOKEN secret --
          # the action exchanges a short-lived GitHub-issued JWT for an
          # upload credential, which Codecov verifies by repository claim.
          use_oidc: true
          files: ./coverage/lcov.info
          flags: unit
          # Don't fail the build on Codecov outages -- coverage drift is
          # signal, not a release blocker.
          fail_ci_if_error: false

      - name: Run integration tests with coverage
        # The wrapper auto-wraps the VS Code Extension Host with xvfb-run
        # when it's available (Ubuntu runners ship it preinstalled); on
        # other platforms it falls through to the real display. Coverage
        # data is gathered via V8 natively, remapped through source maps
        # to TypeScript sources by @vscode/test-cli before lcov is emitted.
        run: npm run test:integration:coverage

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          use_oidc: true
          files: ./coverage/integration/lcov.info
          flags: integration
          fail_ci_if_error: false

  audit:
    name: npm audit (non-blocking)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Informational. Failures here must not block merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies (lockfile only)
        # Skip lifecycle scripts to avoid running anything before audit.
        run: npm ci --ignore-scripts

      - name: npm audit (production deps)
        # `--omit=dev` keeps the report focused on what ships to users; dev-only
        # advisories rarely turn into runtime exposure.
        run: npm audit --omit=dev --audit-level=moderate
