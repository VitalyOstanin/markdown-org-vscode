name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.3.0). Must already exist on the repository.'
        required: true
        type: string
      dry_run:
        description: 'If true, run tests and build the VSIX but skip the GitHub Release step.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Run unit tests
        run: npm test

      - name: Run integration tests
        run: npm run test:integration

  validate-tag:
    name: Validate release tag
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          # Need the full tag object (not just the commit it points at) to
          # verify that the tag is annotated rather than lightweight.
          fetch-tags: true
          fetch-depth: 0

      - name: Verify tag is annotated
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          TAG_TYPE="$(git cat-file -t "$TAG_NAME")"
          if [ "$TAG_TYPE" != "tag" ]; then
            echo "::error::Tag '$TAG_NAME' is lightweight (object type: $TAG_TYPE)."
            echo "::error::Release tags must be annotated. Recreate locally:"
            echo "::error::  git tag -d $TAG_NAME"
            echo "::error::  git tag -a $TAG_NAME -m 'Release $TAG_NAME'"
            echo "::error::  git push --force origin $TAG_NAME"
            exit 1
          fi

      - name: Verify tag matches package.json version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_VERSION="${{ inputs.tag }}"
            TAG_VERSION="${TAG_VERSION#v}"
          else
            TAG_VERSION="${GITHUB_REF_NAME#v}"
          fi
          PKG_VERSION="$(node -p 'require("./package.json").version')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

  package:
    name: Package VSIX (${{ matrix.target }})
    needs: [test, validate-tag]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # One VSIX per VS Code platform. vsce supports per-target packaging
        # on a single host -- the bundled binary inside is opaque to vsce,
        # we only need to drop the right file into bin/ before packaging.
        target: [linux-x64, darwin-x64, darwin-arm64, win32-x64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Compile
        run: npm run compile

      - name: Download bundled extractor binary
        run: bash scripts/download-extractor.sh "${{ matrix.target }}"

      - name: Package VSIX
        run: |
          set -euo pipefail
          VERSION="$(node -p 'require("./package.json").version')"
          npx --no-install @vscode/vsce package \
            --target "${{ matrix.target }}" \
            -o "markdown-org-vscode-${VERSION}-${{ matrix.target }}.vsix"

      - name: Smoke-test VSIX
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          VSIX_FILE="$(ls -1 markdown-org-vscode-*-${TARGET}.vsix 2>/dev/null | head -n1)"
          if [ -z "$VSIX_FILE" ]; then
            echo "::error::vsce package did not produce a .vsix for target $TARGET"
            exit 1
          fi
          if [ ! -s "$VSIX_FILE" ]; then
            echo "::error::VSIX file '$VSIX_FILE' is empty"
            exit 1
          fi
          if ! unzip -tq "$VSIX_FILE"; then
            echo "::error::VSIX file '$VSIX_FILE' is not a valid zip archive"
            exit 1
          fi
          SMOKE_DIR="$(mktemp -d)"
          unzip -q "$VSIX_FILE" -d "$SMOKE_DIR"
          # Bundled binary name depends on target -- only win32-x64 ships
          # the .exe; the other three ship the bare name with +x mode.
          case "$TARGET" in
            win32-*) BUNDLED_BIN="extension/bin/markdown-org-extract.exe" ;;
            *)       BUNDLED_BIN="extension/bin/markdown-org-extract"     ;;
          esac
          for required in \
              extension.vsixmanifest \
              "[Content_Types].xml" \
              extension/package.json \
              extension/out/extension.js \
              extension/LICENSE.txt \
              extension/readme.md \
              extension/changelog.md \
              "$BUNDLED_BIN"; do
            if [ ! -f "$SMOKE_DIR/$required" ]; then
              echo "::error::Required file '$required' missing from VSIX"
              exit 1
            fi
          done
          # Catch regressions where dev/test artifacts leak into the package
          # (coverage/ and .husky/ both slipped into 0.4.0 before this check).
          for forbidden in \
              extension/coverage \
              extension/.husky \
              extension/.c8rc.json \
              extension/src \
              extension/node_modules \
              extension/out/test; do
            if [ -e "$SMOKE_DIR/$forbidden" ]; then
              echo "::error::Forbidden path '$forbidden' present in VSIX"
              exit 1
            fi
          done
          VSIX_VERSION="$(node -p "require('$SMOKE_DIR/extension/package.json').version")"
          PKG_VERSION="$(node -p 'require("./package.json").version')"
          if [ "$VSIX_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::VSIX package.json version ($VSIX_VERSION) does not match repository version ($PKG_VERSION)"
            exit 1
          fi
          VSIX_BYTES="$(stat -c %s "$VSIX_FILE")"
          echo "VSIX smoke-test passed: $VSIX_FILE ($VSIX_VERSION, $VSIX_BYTES bytes)"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: vsix-${{ matrix.target }}
          path: 'markdown-org-vscode-*-${{ matrix.target }}.vsix'
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to GitHub Release
    needs: package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Download VSIX artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG_NAME#v}"
          # Pull the section between `## [VERSION]` and the next `## [` heading.
          # If no matching section exists, fall back to a one-liner -- the
          # workflow should still publish, just without expanded notes.
          awk -v ver="$VERSION" '
            /^## \[/ { if (printing) { exit }; if ($0 ~ "^## \\[" ver "\\]") { printing=1; next } }
            printing { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG section for $TAG_NAME ('## [$VERSION]') found"
            printf 'Release %s\n\nSee CHANGELOG.md for details.\n' "$TAG_NAME" > release-notes.md
          fi
          echo "--- release-notes.md ---"
          cat release-notes.md
          echo "--- end ---"

      - name: Attach VSIX files to GitHub Release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run == false }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: 'markdown-org-vscode-*.vsix'
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
